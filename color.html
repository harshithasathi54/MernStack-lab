<!DOCTYPE html>
<html>
<head>
    <title>PSPK Fan Page</title>

    <!-- CSS inside HTML -->
    <style>
        /* Element Selector */
        body {
            background-color: black;
            color: aqua;
            text-align: center;
            font-family: Arial;
        }

        /* ID Selector */
        #hero {
            color:gold;
            font-size: 40px;
        }

        /* Class Selector */
        .tagline {
            font-size: 20px;
            color: rgb(211, 211, 211);
        }

        /* Class Selector */
        .card {
            background-color: #e3e4da;
            width: 300px;
            margin: auto;
            padding: 15px;
            border-radius: 10px;
        }

        /* Descendant Selector */
        .card img {
            width: 100%;
            border-radius: 10px;
        }

        /* Attribute Selector */
        p[data-movie] {
            color: orange;
            font-weight: bold;
        }

        /* ID Selector */
        #fan {
            background-color: red;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 20px;
        }
    </style>
</head>

<body>

    <h1 id="hero">PSPK</h1>

    <p class="tagline">Powerful actor 🔥</p>

    <div class="card">
        <img src="https://www.cinejosh.com/newsimg/newsmainimg/og-pawan-kalyan_b_1503240808.jpg""PSPK">

        <p>Powerful acting & Powerful name</p>

        <button id="fan">I'm a Fan ❤️</button>
    </div>

    <p data-movie="OG">Popular Movie : OG</p>

</body>
</html>
